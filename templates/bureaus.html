{% extends "base.html" %}

{% block title %}
Bureaus
{% endblock %}

{% block content %}

<h2 class="mb-4">
    Registered Forex Bureaus
</h2>

<div class="card">

    <div class="card-body">

        <table class="table table-striped">

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Location</th>
                    <th>Rates Recorded</th>
                </tr>
            </thead>

            <tbody>

            {% for bureau in bureaus %}

                <tr>
                    <td>{{ bureau.name }}</td>
                    <td>{{ bureau.location }}</td>
                    <td>{{ bureau.rates|length }}</td>
                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
