{% extends "base.html" %}

{% block title %}
Add Bureau
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card">

            <div class="card-header">
                Add Bureau
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">
                            Bureau Name
                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Location
                        </label>

                        <input
                            type="text"
                            name="location"
                            class="form-control"
                            required>
                    </div>

                    <button class="btn btn-primary">
                        Save Bureau
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
