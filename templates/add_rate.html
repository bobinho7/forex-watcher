{% extends "base.html" %}

{% block title %}
Add Rate
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card">

            <div class="card-header">
                Add Exchange Rate
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Bureau
                        </label>

                        <select
                            name="bureau_id"
                            class="form-select"
                            required>

                            {% for bureau in bureaus %}

                                <option value="{{ bureau.id }}">
                                    {{ bureau.name }}
                                </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Buy Rate
                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="buy_rate"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Sell Rate
                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="sell_rate"
                            class="form-control"
                            required>

                    </div>

                    <button class="btn btn-success">
                        Save Rate
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
