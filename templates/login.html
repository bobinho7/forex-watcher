{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-4">

        <div class="card">

            <div class="card-header">
                Login
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label>Username</label>
                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>
                    </div>

                    <button class="btn btn-primary">
                        Login
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
